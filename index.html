<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KnowDB</title>
    <style>
      :root {
        --c-accent: #0969da;
        --c-accent-hover: #0757ba;
        --c-bg: #ffffff;
        --c-surface: #f6f8fa;
        --c-border: #d0d7de;
        --c-text: #1f2328;
        --c-muted: #656d76;
        --c-tool-bg: #faf5ff;
        --c-tool-border: #d8b4fe;
        --c-tool-text: #6b21a8;
        --radius: 6px;
        --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 14px;
        color: var(--c-text);
        background: var(--c-bg);
        height: 100vh;
        overflow: hidden;
      }

      /* ── Layout ── */
      .layout {
        display: flex;
        height: 100vh;
      }

      .panel {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 0;
      }

      .panel-left {
        width: 50%;
        border-right: 1px solid var(--c-border);
      }

      .panel-right {
        flex: 1;
      }

      /* ── Panel header ── */
      .panel-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        background: var(--c-surface);
        border-bottom: 1px solid var(--c-border);
        flex-shrink: 0;
      }

      .logo {
        font-weight: 600;
        font-size: 13px;
        white-space: nowrap;
      }

      /* ── Left panel body ── */
      .left-body {
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
      }

      .doc-tree {
        flex: 0 0 38%;
        overflow-y: auto;
        padding: 6px 8px;
        border-bottom: 1px solid var(--c-border);
      }

      .preview-area {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
      }

      .nav-bar {
        display: flex;
        gap: 6px;
        padding: 6px 10px;
        background: var(--c-surface);
        border-top: 1px solid var(--c-border);
        flex-shrink: 0;
      }

      /* ── Search input ── */
      .search-input {
        flex: 1;
        height: 26px;
        padding: 0 8px;
        border: 1px solid var(--c-border);
        border-radius: var(--radius);
        background: var(--c-bg);
        font-size: 13px;
        color: var(--c-text);
        outline: none;
      }

      .search-input:focus {
        border-color: var(--c-accent);
        box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.12);
      }

      /* ── Doc tree items ── */
      .doc-item { margin-bottom: 2px; }

      .doc-label {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px 6px;
        border-radius: var(--radius);
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        user-select: none;
        color: var(--c-text);
      }

      .doc-label:hover { background: var(--c-surface); }

      .caret {
        display: inline-block;
        font-size: 9px;
        color: var(--c-muted);
        width: 10px;
        transition: transform 0.15s;
        flex-shrink: 0;
      }

      .doc-label.open .caret { transform: rotate(90deg); }

      .chunk-list { display: none; margin-left: 16px; }
      .chunk-list.open { display: block; }

      .chunk-item {
        padding: 2px 6px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-family: var(--font-mono);
        color: var(--c-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chunk-item:hover { background: var(--c-surface); color: var(--c-accent); }
      .chunk-item.selected { background: #dbeafe; color: var(--c-accent); font-weight: 500; }

      /* ── Search results ── */
      .search-result-item {
        display: flex;
        justify-content: space-between;
        padding: 4px 6px;
        border-radius: var(--radius);
        cursor: pointer;
        font-size: 12px;
        font-family: var(--font-mono);
        color: var(--c-text);
        border-bottom: 1px solid var(--c-border);
      }

      .search-result-item:hover { background: var(--c-surface); }
      .search-result-item.selected { color: var(--c-accent); }

      .search-score {
        font-size: 11px;
        color: var(--c-muted);
        flex-shrink: 0;
      }

      /* ── Preview ── */
      .preview-id {
        font-size: 11px;
        color: var(--c-muted);
        font-family: var(--font-mono);
        margin-bottom: 8px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--c-border);
      }

      .preview-content {
        font-family: var(--font-mono);
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.7;
        color: var(--c-text);
      }

      .status-text {
        color: var(--c-muted);
        font-size: 12px;
        font-style: italic;
        text-align: center;
        padding: 12px 8px;
      }

      /* ── Nav bar buttons ── */
      .nav-btn {
        padding: 3px 10px;
        border: 1px solid var(--c-border);
        border-radius: var(--radius);
        background: var(--c-bg);
        cursor: pointer;
        font-size: 12px;
        color: var(--c-text);
      }

      .nav-btn:hover { background: var(--c-surface); border-color: var(--c-accent); color: var(--c-accent); }

      .nav-chunk-list { display: flex; flex-direction: column; gap: 3px; }

      /* ── Right panel: API key row ── */
      .api-key-row {
        display: flex;
        gap: 4px;
        flex: 1;
      }

      .api-key-input {
        flex: 1;
        height: 26px;
        padding: 0 8px;
        border: 1px solid var(--c-border);
        border-radius: var(--radius);
        font-size: 12px;
        font-family: var(--font-mono);
        background: var(--c-bg);
        color: var(--c-text);
        outline: none;
      }

      .api-key-input:focus {
        border-color: var(--c-accent);
        box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.12);
      }

      .btn-small {
        height: 26px;
        padding: 0 10px;
        border: 1px solid var(--c-border);
        border-radius: var(--radius);
        background: var(--c-bg);
        cursor: pointer;
        font-size: 12px;
        white-space: nowrap;
        color: var(--c-text);
      }

      .btn-small:hover { background: var(--c-surface); }

      /* ── Chat messages ── */
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .chat-bubble {
        padding: 8px 12px;
        border-radius: var(--radius);
        font-size: 13px;
        line-height: 1.5;
        max-width: 88%;
        word-break: break-word;
      }

      .chat-bubble.user {
        align-self: flex-end;
        background: var(--c-accent);
        color: #fff;
      }

      .chat-bubble.assistant {
        align-self: flex-start;
        background: var(--c-surface);
        border: 1px solid var(--c-border);
        white-space: pre-wrap;
      }

      /* ── Tool trace ── */
      .tool-trace {
        align-self: flex-start;
        max-width: 92%;
      }

      .tool-trace summary {
        cursor: pointer;
        list-style: none;
        font-size: 11px;
        color: var(--c-tool-text);
        padding: 3px 8px;
        border-radius: var(--radius);
        border: 1px solid var(--c-tool-border);
        background: var(--c-tool-bg);
        display: inline-flex;
        align-items: center;
        gap: 4px;
        user-select: none;
      }

      .tool-trace summary::-webkit-details-marker { display: none; }
      .tool-trace summary:hover { filter: brightness(0.97); }

      .tool-trace-body {
        margin-top: 4px;
        padding: 8px 10px;
        background: var(--c-tool-bg);
        border: 1px solid var(--c-tool-border);
        border-radius: var(--radius);
        font-family: var(--font-mono);
        font-size: 11px;
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--c-tool-text);
        max-height: 200px;
        overflow-y: auto;
      }

      /* ── Chat input row ── */
      .chat-input-row {
        display: flex;
        gap: 8px;
        padding: 8px 12px;
        background: var(--c-surface);
        border-top: 1px solid var(--c-border);
        flex-shrink: 0;
        align-items: flex-end;
      }

      .chat-input {
        flex: 1;
        padding: 6px 10px;
        border: 1px solid var(--c-border);
        border-radius: var(--radius);
        background: var(--c-bg);
        font-size: 13px;
        font-family: inherit;
        color: var(--c-text);
        resize: none;
        outline: none;
        line-height: 1.5;
      }

      .chat-input:focus {
        border-color: var(--c-accent);
        box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.12);
      }

      .btn-send {
        height: 36px;
        padding: 0 16px;
        background: var(--c-accent);
        color: #fff;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .btn-send:hover:not(:disabled) { background: var(--c-accent-hover); }

      .btn-send:disabled { opacity: 0.55; cursor: not-allowed; }

      /* ── Responsive ── */
      @media (max-width: 768px) {
        .layout { flex-direction: column; }
        .panel-left { width: 100%; flex: 0 0 50vh; border-right: none; border-bottom: 1px solid var(--c-border); }
        .panel-right { flex: 1; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <!-- Left Panel: Doc navigation + preview -->
      <div class="panel panel-left">
        <div class="panel-header">
          <span class="logo">KnowDB</span>
          <input class="search-input" id="search-input" type="search" placeholder="Search chunks…" autocomplete="off" />
        </div>
        <div class="left-body">
          <div class="doc-tree" id="doc-tree">
            <div class="status-text">Loading…</div>
          </div>
          <div class="preview-area" id="preview-area">
            <div class="status-text">Select a chunk to preview</div>
          </div>
          <div class="nav-bar" id="nav-bar" style="display:none">
            <button class="nav-btn" id="btn-parent">↑ Parent</button>
            <button class="nav-btn" id="btn-siblings">↔ Siblings</button>
            <button class="nav-btn" id="btn-expand">⊕ Expand</button>
          </div>
        </div>
      </div>

      <!-- Right Panel: Agent QA chat -->
      <div class="panel panel-right">
        <div class="panel-header">
          <span class="logo">Agent QA</span>
          <div class="api-key-row">
            <input class="api-key-input" id="api-key-input" type="password" placeholder="sk-ant-… Anthropic API key" autocomplete="off" spellcheck="false" />
            <button class="btn-small" id="btn-save-key">Save</button>
          </div>
        </div>
        <div class="chat-messages" id="chat-messages">
          <div class="status-text">Enter your Anthropic API key, then ask a question about the knowledge base.</div>
        </div>
        <div class="chat-input-row">
          <textarea class="chat-input" id="chat-input" rows="2" placeholder="Ask a question… (Enter to send, Shift+Enter for newline)"></textarea>
          <button class="btn-send" id="btn-send">Send</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/ui.ts"></script>
  </body>
</html>
